<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HybridVault — AES-256 + RSA-2048</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0c10;
    --panel:    #0f1117;
    --border:   #1e2535;
    --accent:   #00e5ff;
    --accent2:  #7b2fff;
    --danger:   #ff3b5c;
    --success:  #00e676;
    --text:     #cdd6f4;
    --muted:    #4a5270;
    --glow:     0 0 18px rgba(0,229,255,.35);
    --glow2:    0 0 18px rgba(123,47,255,.35);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    font-size:16px;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* animated grid bg */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* scan line */
  body::after{
    content:'';
    position:fixed;top:0;left:0;right:0;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    animation:scan 4s linear infinite;
    z-index:1;
    opacity:.6;
  }
  @keyframes scan{0%{top:-2px}100%{top:100vh}}

  /* ?? HEADER ?? */
  header{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 40px;
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(6px);
  }
  .logo{
    font-family:'Share Tech Mono',monospace;
    font-size:1.3rem;
    color:var(--accent);
    letter-spacing:.1em;
    text-shadow:var(--glow);
  }
  .logo span{color:var(--accent2);text-shadow:var(--glow2)}
  .status-badge{
    font-family:'Share Tech Mono',monospace;
    font-size:.75rem;
    padding:4px 12px;
    border-radius:20px;
    border:1px solid var(--muted);
    color:var(--muted);
    transition:all .4s;
  }
  .status-badge.online{
    border-color:var(--success);
    color:var(--success);
    box-shadow:0 0 10px rgba(0,230,118,.25);
  }
  .status-badge.error{
    border-color:var(--danger);
    color:var(--danger);
  }

  /* ?? MAIN ?? */
  main{
    position:relative;z-index:10;
    max-width:900px;
    margin:0 auto;
    padding:40px 20px 60px;
  }

  h1{
    font-size:2.6rem;
    font-weight:700;
    letter-spacing:.06em;
    line-height:1.1;
    margin-bottom:6px;
  }
  h1 .hl{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .subtitle{
    font-family:'Share Tech Mono',monospace;
    font-size:.8rem;
    color:var(--muted);
    letter-spacing:.12em;
    margin-bottom:36px;
  }

  /* ?? TABS ?? */
  .tabs{
    display:flex;gap:4px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:4px;
    margin-bottom:28px;
    width:fit-content;
  }
  .tab{
    padding:8px 28px;
    border-radius:6px;
    border:none;
    background:transparent;
    color:var(--muted);
    font-family:'Rajdhani',sans-serif;
    font-size:1rem;
    font-weight:600;
    letter-spacing:.08em;
    cursor:pointer;
    transition:all .25s;
  }
  .tab.active{
    background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(123,47,255,.15));
    color:var(--accent);
    box-shadow:inset 0 0 0 1px rgba(0,229,255,.3);
  }
  .tab:not(.active):hover{color:var(--text)}

  /* ?? PANELS ?? */
  .panel{display:none}
  .panel.active{display:block}

  /* ?? MODE SELECTOR ?? */
  .mode-row{
    display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
  }
  .mode-btn{
    flex:1;min-width:120px;
    padding:10px 18px;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--muted);
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:.95rem;
    letter-spacing:.06em;
    cursor:pointer;
    transition:all .2s;
  }
  .mode-btn.active{
    border-color:var(--accent);
    color:var(--accent);
    background:rgba(0,229,255,.08);
    box-shadow:var(--glow);
  }

  /* ?? INPUT AREA ?? */
  .input-section{margin-bottom:16px}
  label{
    display:block;
    font-family:'Share Tech Mono',monospace;
    font-size:.75rem;
    color:var(--muted);
    letter-spacing:.1em;
    margin-bottom:6px;
  }
  textarea{
    width:100%;
    height:160px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    color:var(--text);
    font-family:'Share Tech Mono',monospace;
    font-size:.85rem;
    padding:14px;
    resize:vertical;
    outline:none;
    transition:border-color .2s;
  }
  textarea:focus{border-color:var(--accent);box-shadow:var(--glow)}
  textarea::placeholder{color:var(--muted)}

  /* ?? FILE DROP ZONE ?? */
  .drop-zone{
    border:2px dashed var(--border);
    border-radius:8px;
    padding:36px 20px;
    text-align:center;
    cursor:pointer;
    transition:all .25s;
    background:var(--panel);
    position:relative;
  }
  .drop-zone:hover,.drop-zone.drag-over{
    border-color:var(--accent);
    background:rgba(0,229,255,.04);
    box-shadow:var(--glow);
  }
  .drop-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  }
  .drop-icon{font-size:2rem;margin-bottom:8px;display:block}
  .drop-text{
    font-family:'Share Tech Mono',monospace;
    font-size:.8rem;
    color:var(--muted);
  }
  .drop-text strong{color:var(--accent)}
  .file-info{
    margin-top:10px;
    font-family:'Share Tech Mono',monospace;
    font-size:.75rem;
    color:var(--success);
  }

  /* ?? ACTION BUTTON ?? */
  .action-btn{
    width:100%;
    padding:14px;
    margin-top:16px;
    border-radius:6px;
    border:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#000;
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:1.1rem;
    letter-spacing:.12em;
    cursor:pointer;
    transition:all .25s;
    position:relative;
    overflow:hidden;
  }
  .action-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 4px 24px rgba(0,229,255,.4);
  }
  .action-btn:active{transform:translateY(0)}
  .action-btn:disabled{
    opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;
  }
  .action-btn.danger{
    background:linear-gradient(135deg,var(--danger),var(--accent2));
  }

  /* ?? RESULT ?? */
  .result-box{
    margin-top:20px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    display:none;
  }
  .result-box.visible{display:block}
  .result-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    background:rgba(0,229,255,.04);
  }
  .result-label{
    font-family:'Share Tech Mono',monospace;
    font-size:.75rem;
    color:var(--accent);
    letter-spacing:.1em;
  }
  .result-actions{display:flex;gap:8px}
  .mini-btn{
    padding:4px 12px;
    border-radius:4px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--muted);
    font-family:'Rajdhani',sans-serif;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
  }
  .mini-btn:hover{border-color:var(--accent);color:var(--accent)}
  .result-body{
    padding:14px;
    font-family:'Share Tech Mono',monospace;
    font-size:.8rem;
    word-break:break-all;
    max-height:200px;
    overflow-y:auto;
    color:var(--text);
    white-space:pre-wrap;
  }

  /* ?? PROGRESS ?? */
  .progress-wrap{
    margin-top:14px;
    display:none;
  }
  .progress-wrap.visible{display:block}
  .progress-bar-track{
    height:3px;
    background:var(--border);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-bar-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .3s;
    border-radius:2px;
  }
  .progress-msg{
    font-family:'Share Tech Mono',monospace;
    font-size:.72rem;
    color:var(--muted);
    margin-top:6px;
  }

  /* ?? TOAST ?? */
  #toast{
    position:fixed;bottom:28px;right:28px;
    padding:12px 20px;
    border-radius:8px;
    font-family:'Share Tech Mono',monospace;
    font-size:.8rem;
    z-index:9999;
    transform:translateY(80px);
    opacity:0;
    transition:all .3s;
    pointer-events:none;
  }
  #toast.show{transform:translateY(0);opacity:1}
  #toast.success{background:#00e67622;border:1px solid var(--success);color:var(--success)}
  #toast.error{background:#ff3b5c22;border:1px solid var(--danger);color:var(--danger)}

  /* ?? SCROLLBAR ?? */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:var(--panel)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">HYBRID<span>VAULT</span></div>
  <div id="serverStatus" class="status-badge">? CHECKING...</div>
</header>

<main>
  <h1><span class="hl">AES-256</span> + RSA-2048<br>Hybrid Encryption</h1>
  <p class="subtitle">// MILITARY-GRADE HYBRID CRYPTOGRAPHY ENGINE</p>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('encrypt',this)">ENCRYPT</button>
    <button class="tab"        onclick="switchTab('decrypt',this)">DECRYPT</button>
  </div>

  <!--  ENCRYPT PANEL  -->
  <div id="panel-encrypt" class="panel active">

    <div class="mode-row">
      <button class="mode-btn active" id="encTextBtn" onclick="setMode('enc','text',this)">TEXT INPUT</button>
      <button class="mode-btn"        id="encFileBtn" onclick="setMode('enc','file',this)">FILE UPLOAD</button>
    </div>

    <!-- text mode -->
    <div id="enc-text-area" class="input-section">
      <label>// PLAINTEXT INPUT</label>
      <textarea id="encInput" placeholder="Paste your plaintext here..."></textarea>
    </div>

    <!-- file mode -->
    <div id="enc-file-area" class="input-section" style="display:none">
      <label>// DROP FILE OR CLICK TO BROWSE</label>
      <div class="drop-zone" id="encDropZone">
        <input type="file" id="encFileInput" onchange="handleFileSelect('enc',this)"/>
        <span class="drop-icon">?</span>
        <p class="drop-text">Drop any file here or <strong>click to browse</strong></p>
        <p class="file-info" id="encFileInfo"></p>
      </div>
    </div>

    <button class="action-btn" id="encBtn" onclick="doEncrypt()">
      ? ENCRYPT
    </button>

    <div class="progress-wrap" id="encProgress">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="encBar"></div></div>
      <p class="progress-msg" id="encMsg">Initializing...</p>
    </div>

    <div class="result-box" id="encResult">
      <div class="result-header">
        <span class="result-label">// ENCRYPTED OUTPUT (BASE64)</span>
        <div class="result-actions">
          <button class="mini-btn" onclick="copyResult('encOutput')">COPY</button>
          <button class="mini-btn" onclick="downloadResult('encOutput','encrypted.enc')">DOWNLOAD .ENC</button>
        </div>
      </div>
      <div class="result-body" id="encOutput"></div>
    </div>
  </div>

  <!-- ?? DECRYPT PANEL ?? -->
  <div id="panel-decrypt" class="panel">

    <div class="mode-row">
      <button class="mode-btn active" id="decTextBtn" onclick="setMode('dec','text',this)">PASTE BASE64</button>
      <button class="mode-btn"        id="decFileBtn" onclick="setMode('dec','file',this)">UPLOAD .ENC FILE</button>
    </div>

    <!-- text mode -->
    <div id="dec-text-area" class="input-section">
      <label>// PASTE BASE64-ENCODED CIPHERTEXT</label>
      <textarea id="decInput" placeholder="Paste base64 encrypted data here..."></textarea>
    </div>

    <!-- file mode -->
    <div id="dec-file-area" class="input-section" style="display:none">
      <label>// UPLOAD ENCRYPTED .ENC FILE</label>
      <div class="drop-zone" id="decDropZone">
        <input type="file" id="decFileInput" accept=".enc" onchange="handleFileSelect('dec',this)"/>
        <span class="drop-icon">?</span>
        <p class="drop-text">Drop <strong>.enc file</strong> here or click to browse</p>
        <p class="file-info" id="decFileInfo"></p>
      </div>
    </div>

    <button class="action-btn danger" id="decBtn" onclick="doDecrypt()">
      ?? DECRYPT
    </button>

    <div class="progress-wrap" id="decProgress">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="decBar"></div></div>
      <p class="progress-msg" id="decMsg">Initializing...</p>
    </div>

    <div class="result-box" id="decResult">
      <div class="result-header">
        <span class="result-label">// DECRYPTED OUTPUT</span>
        <div class="result-actions">
          <button class="mini-btn" onclick="copyResult('decOutput')">COPY</button>
          <button class="mini-btn" id="decDownloadBtn" onclick="downloadDecrypted()">DOWNLOAD</button>
        </div>
      </div>
      <div class="result-body" id="decOutput"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ?? CONFIG ?????????????????????????????????????????????????????????
const SERVER = ''; // empty = same server that served this page

// ?? STATE ??????????????????????????????????????????????????????????
let encMode = 'text', decMode = 'text';
let encFileData = null, decFileData = null;
let decryptedBytes = null, decryptedFilename = 'decrypted';

// ?? SERVER HEALTH CHECK ????????????????????????????????????????????
async function checkServer() {
  try {
    const r = await fetch(`${SERVER}/api/health`, {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    const el = document.getElementById('serverStatus');
    el.textContent = '? SERVER ONLINE';
    el.className = 'status-badge online';
  } catch {
    const el = document.getElementById('serverStatus');
    el.textContent = '? SERVER OFFLINE';
    el.className = 'status-badge error';
  }
}
checkServer();
setInterval(checkServer, 10000);

// ?? TAB SWITCHING ??????????????????????????????????????????????????
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ?? MODE BUTTONS ???????????????????????????????????????????????????
function setMode(panel, mode, btn) {
  const prefix = panel;
  document.querySelectorAll(`#panel-${panel === 'enc' ? 'encrypt' : 'decrypt'} .mode-btn`)
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (panel === 'enc') {
    encMode = mode;
    document.getElementById('enc-text-area').style.display = mode === 'text' ? 'block' : 'none';
    document.getElementById('enc-file-area').style.display = mode === 'file' ? 'block' : 'none';
  } else {
    decMode = mode;
    document.getElementById('dec-text-area').style.display = mode === 'text' ? 'block' : 'none';
    document.getElementById('dec-file-area').style.display = mode === 'file' ? 'block' : 'none';
  }
}

// ?? FILE SELECT ????????????????????????????????????????????????????
function handleFileSelect(panel, input) {
  const file = input.files[0];
  if (!file) return;
  const info = document.getElementById(panel + 'FileInfo');
  info.textContent = `? ${file.name}  (${formatSize(file.size)})`;

  const reader = new FileReader();
  reader.onload = e => {
    const bytes = new Uint8Array(e.target.result);
    if (panel === 'enc') {
      encFileData = bytes;
      encFileData._name = file.name;
    } else {
      decFileData = bytes;
      decryptedFilename = file.name.replace(/\.enc$/i, '') || 'decrypted';
    }
  };
  reader.readAsArrayBuffer(file);
}

// Drag-over styling
['encDropZone','decDropZone'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-over');
    const input = el.querySelector('input[type=file]');
    if (e.dataTransfer.files[0]) {
      const dt = new DataTransfer();
      dt.items.add(e.dataTransfer.files[0]);
      input.files = dt.files;
      input.dispatchEvent(new Event('change'));
    }
  });
});

// ?? ENCRYPT ????????????????????????????????????????????????????????
async function doEncrypt() {
  let bytes;
  if (encMode === 'text') {
    const txt = document.getElementById('encInput').value;
    if (!txt.trim()) { toast('Enter some text first', 'error'); return; }
    bytes = new TextEncoder().encode(txt);
  } else {
    if (!encFileData) { toast('Select a file first', 'error'); return; }
    bytes = encFileData;
  }

  setProgress('enc', true, 'Sending to C++ server...', 30);
  document.getElementById('encBtn').disabled = true;
  document.getElementById('encResult').classList.remove('visible');

  try {
    const b64 = bytesToBase64(bytes);
    setProgress('enc', true, 'AES-256 + RSA-2048 encrypting...', 65);

    const res = await fetch(`${SERVER}/api/encrypt`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: b64})
    });
    const json = await res.json();

    if (!json.success) throw new Error(json.error || 'Encryption failed');

    setProgress('enc', true, 'Done!', 100);
    document.getElementById('encOutput').textContent = json.encryptedData;
    document.getElementById('encResult').classList.add('visible');
    toast(`Encrypted ${formatSize(json.fileSize)}`, 'success');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    setTimeout(() => setProgress('enc', false), 800);
    document.getElementById('encBtn').disabled = false;
  }
}

// ?? DECRYPT ????????????????????????????????????????????????????????
async function doDecrypt() {
  let b64;
  if (decMode === 'text') {
    b64 = document.getElementById('decInput').value.trim();
    if (!b64) { toast('Paste encrypted data first', 'error'); return; }
  } else {
    if (!decFileData) { toast('Select a .enc file first', 'error'); return; }
    b64 = bytesToBase64(decFileData);
  }

  setProgress('dec', true, 'Sending to C++ server...', 30);
  document.getElementById('decBtn').disabled = true;
  document.getElementById('decResult').classList.remove('visible');

  try {
    setProgress('dec', true, 'RSA key decryption + AES decryption...', 65);
    const res = await fetch(`${SERVER}/api/decrypt`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({data: b64})
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Decryption failed');

    decryptedBytes = base64ToBytes(json.decryptedData);
    // Try to show as text
    try {
      const text = new TextDecoder('utf-8', {fatal: true}).decode(decryptedBytes);
      document.getElementById('decOutput').textContent = text;
    } catch {
      document.getElementById('decOutput').textContent =
        '[Binary file — use DOWNLOAD to save]';
    }
    setProgress('dec', true, 'Done!', 100);
    document.getElementById('decResult').classList.add('visible');
    toast(`Decrypted ${formatSize(json.fileSize)}`, 'success');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    setTimeout(() => setProgress('dec', false), 800);
    document.getElementById('decBtn').disabled = false;
  }
}

// ?? COPY / DOWNLOAD ????????????????????????????????????????????????
function copyResult(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  toast('Copied to clipboard', 'success');
}

function downloadResult(id, filename) {
  const text = document.getElementById(id).textContent;

  // If we're downloading the encrypted .enc file, write RAW BINARY
  if (filename.toLowerCase().endsWith('.enc')) {
    const bytes = base64ToBytes(text);
    const blob = new Blob([bytes], { type: 'application/octet-stream' });
    triggerDownload(blob, filename);
    return;
  }

  // Otherwise treat as text
  const blob = new Blob([text], {type: 'application/octet-stream'});
  triggerDownload(blob, filename);
}

function downloadDecrypted() {
  if (!decryptedBytes) { toast('Nothing to download', 'error'); return; }
  const blob = new Blob([decryptedBytes]);
  triggerDownload(blob, decryptedFilename);
}

function triggerDownload(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ?? PROGRESS ???????????????????????????????????????????????????????
function setProgress(panel, visible, msg = '', pct = 0) {
  const wrap = document.getElementById(panel + 'Progress');
  const bar  = document.getElementById(panel + 'Bar');
  const msgEl= document.getElementById(panel + 'Msg');
  wrap.classList.toggle('visible', visible);
  bar.style.width = pct + '%';
  if (msg) msgEl.textContent = msg;
}

// ?? BASE64 UTILS ???????????????????????????????????????????????????
function bytesToBase64(bytes) {
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// ?? TOAST ??????????????????????????????????????????????????????????
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}
